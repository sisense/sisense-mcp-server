<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP App Test Host</title>
  </head>
  <body style="margin:0;padding:0">
    <iframe id="app" src="/view.html" style="width:1000px;height:600px;border:none"></iframe>
    <script>
      const iframe = document.getElementById('app');
      // chartId -> JSON string payload, set by test before sending tool result
      const chartPayloads = {};

      window.addEventListener('message', (e) => {
        const msg = e.data;
        if (msg?.jsonrpc !== '2.0') return;

        if (msg.method === 'ui/initialize') {
          iframe.contentWindow.postMessage({
            jsonrpc: '2.0',
            id: msg.id,
            result: {
              protocolVersion: '2026-01-26',
              hostInfo: { name: 'Test Host', version: '1.0.0' },
              hostCapabilities: {},
              hostContext: { safeAreaInsets: { top: 0, right: 0, bottom: 0, left: 0 } }
            }
          }, '*');
        }

        if (msg.method === 'ui/notifications/initialized') {
          window._appReady = true;
        }

        if (msg.method === 'resources/read') {
          const uri = msg.params?.uri ?? '';
          const match = uri.match(/\/chart\/([^/?#]+)$/);
          const chartId = match?.[1];
          const payloadText = chartId ? chartPayloads[chartId] : undefined;

          if (payloadText) {
            iframe.contentWindow.postMessage({
              jsonrpc: '2.0',
              id: msg.id,
              result: {
                contents: [{ uri, mimeType: 'application/json', text: payloadText }]
              }
            }, '*');
          } else {
            iframe.contentWindow.postMessage({
              jsonrpc: '2.0',
              id: msg.id,
              error: { code: -32001, message: `Chart not found: ${chartId}` }
            }, '*');
          }
        }
      });

      window.sendToolResult = function(result) {
        iframe.contentWindow.postMessage({
          jsonrpc: '2.0',
          method: 'ui/notifications/tool-result',
          params: result
        }, '*');
      };

      // Called by the test before sendToolResult to register chart payload
      window.setChartPayload = function(chartId, payloadText) {
        chartPayloads[chartId] = payloadText;
      };
    </script>
  </body>
</html>
